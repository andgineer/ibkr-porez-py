name: Build Installers

on:
  workflow_run:
    workflows: ["Upload Python Package"]
    types: [completed]

# Required for softprops/action-gh-release to attach assets to the release.
permissions:
  contents: write

jobs:
  build:
    # Only run when the upstream workflow succeeded; avoids noisy runs when no release was created.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            package_args: --no-sign
          - os: windows-latest
            package_args: ""
    steps:
      # Pin checkout to the exact SHA that triggered pip_publish, not the current branch HEAD,
      # so tag lookup finds the correct release tag even if the branch moved.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Detect version tag
        id: tag
        shell: bash
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -n "$TAG" ]; then
            echo "version_tag=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.tag.outputs.version_tag != ''
        with:
          python-version: "3.12"
      - name: Install Briefcase
        if: steps.tag.outputs.version_tag != ''
        run: pip install briefcase 'chardet<6'
      - name: Build installer
        if: steps.tag.outputs.version_tag != ''
        run: |
          briefcase create
          briefcase build
          briefcase package ${{ matrix.package_args }}
      - name: Attach to Release
        if: steps.tag.outputs.version_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version_tag }}
          files: |
            **/*.dmg
            **/*.msi
            **/*.AppImage
